<section class="experiment">
    <h2>Challenge 9</h2>
    <h3>Blob URL Media</h3>
    <p>This example loads an image through a blob URL created from a generated image file.</p>

    <div class="experiment-controls">
        <button id="load-blob-url" type="button">Load Blob URL</button>
    </div>

    <div class="dynamic-demo-grid">
        <section>
            <span class="status-pill">blob URL</span>
            <div id="blob-preview"></div>
            <p id="blob-status">No blob URL created yet.</p>
        </section>
    </div>

    <script>
        const blobStatus = document.getElementById('blob-status');
        const blobPreview = document.getElementById('blob-preview');

        function createBlobImage() {
            const canvas = document.createElement('canvas');
            canvas.width = 240;
            canvas.height = 140;
            const context = canvas.getContext('2d');
            context.fillStyle = '#1f4d8f';
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = 'white';
            context.font = 'bold 24px sans-serif';
            context.fillText('Blob URL', 40, 70);
            context.font = '16px sans-serif';
            context.fillText('Generated image', 40, 100);

            canvas.toBlob(function (blob) {
                if (!blob) {
                    return;
                }

                const url = URL.createObjectURL(blob);
                const image = document.createElement('img');
                image.src = url;
                image.alt = 'blob URL preview';
                image.style.maxWidth = '100%';
                image.style.maxHeight = '120px';
                blobPreview.innerHTML = '';
                blobPreview.appendChild(image);
                blobStatus.textContent = 'blob URL created and attached.';
            }, 'image/png');
        }

        document.getElementById('load-blob-url').addEventListener('click', createBlobImage);
    </script>
</section>
