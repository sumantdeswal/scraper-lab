<section class="experiment">
    <h2>Challenge 6</h2>
    <h3>Embedded JSON</h3>
    <p>Metadata is embedded directly in the page inside a JSON script block.</p>

    <div class="product-card">
        <h4>Invisible Product Data</h4>
        <p>This page contains embedded JSON that describes the title, description, and image URLs.</p>
    </div>

    <button id="show-json-data" type="button">Show Parsed Data</button>
    <pre id="embedded-json-output"></pre>
    <div class="image-gallery" id="embedded-json-gallery"></div>

    <script type="application/json" id="product-data">
        {
            "product": {
                "title": "Research Jacket",
                "description": "A lightweight jacket used to demonstrate embedded JSON delivery.",
                "images": [
                    "{{ url_for('static', filename='images/look1.jpg') }}",
                    "{{ url_for('static', filename='images/look2.jpg') }}",
                    "{{ url_for('static', filename='images/look3.jpg') }}"
                ]
            }
        }
    </script>

    <script>
        function renderImages(urls, container) {
            container.innerHTML = urls.map(function (src) {
                return '<img src="' + src + '" alt="Product image">';
            }).join('');
        }

        document.getElementById('show-json-data').addEventListener('click', function () {
            const raw = document.getElementById('product-data').textContent;
            const payload = JSON.parse(raw);
            const output = {
                title: payload.product.title,
                description: payload.product.description,
                imageCount: payload.product.images.length,
                images: payload.product.images
            };
            document.getElementById('embedded-json-output').textContent = JSON.stringify(output, null, 2);
            renderImages(payload.product.images, document.getElementById('embedded-json-gallery'));
        });
    </script>
</section>
