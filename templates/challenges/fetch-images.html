<section class="experiment">
    <h2>Challenge 14</h2>
    <h3>Images Loaded via fetch()</h3>
    <p>Image URLs are fetched from a static JSON file and rendered into the page.</p>

    <button id="load-fetch-images" type="button">Load Fetch Images</button>
    <div class="image-gallery" id="fetch-images-gallery"></div>

    <script>
        async function loadFetchImages() {
            const response = await fetch('/static/data/images.json');
            const data = await response.json();
            const gallery = document.getElementById('fetch-images-gallery');
            gallery.innerHTML = data.images.map(function (src) {
                return '<img src="' + src + '" alt="Fetched image">';
            }).join('');
        }

        document.getElementById('load-fetch-images').addEventListener('click', loadFetchImages);
    </script>
</section>
