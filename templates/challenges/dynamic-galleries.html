<section class="experiment">
    <h2>Challenge 8</h2>
    <h3>Dynamic Galleries</h3>
    <p>Gallery content changes while browsing through progressive loading, infinite scrolling, and carousel interactions.</p>

    <div class="gallery-stack">
        <div class="gallery-card">
            <span class="status-pill">Load More</span>
            <div id="load-more-gallery" class="gallery-grid"></div>
            <div class="gallery-controls">
                <button id="load-more-button" type="button">Load More</button>
            </div>
        </div>

        <div class="gallery-card">
            <span class="status-pill">Infinite Scroll</span>
            <div id="infinite-gallery" class="gallery-grid"></div>
            <div id="infinite-sentinel" class="infinite-sentinel"></div>
        </div>

        <div class="gallery-card">
            <span class="status-pill">Carousel</span>
            <div class="carousel-shell">
                <div class="carousel-frame">
                    <img id="carousel-image" src="" alt="Featured gallery image">
                </div>
                <p id="carousel-caption" class="carousel-caption">Loading carousel…</p>
                <div class="gallery-controls">
                    <button id="carousel-previous" type="button">Previous</button>
                    <button id="carousel-next" type="button">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const galleryImages = [
            { src: "{{ url_for('static', filename='images/look1.jpg') }}", alt: "Gallery image 1" },
            { src: "{{ url_for('static', filename='images/look2.jpg') }}", alt: "Gallery image 2" },
            { src: "{{ url_for('static', filename='images/look3.jpg') }}", alt: "Gallery image 3" },
            { src: "{{ url_for('static', filename='images/look1.jpg') }}", alt: "Gallery image 4" },
            { src: "{{ url_for('static', filename='images/look2.jpg') }}", alt: "Gallery image 5" },
            { src: "{{ url_for('static', filename='images/look3.jpg') }}", alt: "Gallery image 6" }
        ];

        function createGalleryImage(item, index) {
            const img = document.createElement('img');
            img.src = item.src;
            img.alt = item.alt + ' ' + (index + 1);
            img.loading = 'lazy';
            return img;
        }

        function renderBatch(rootId, startIndex, count) {
            const root = document.getElementById(rootId);
            const fragment = document.createDocumentFragment();
            for (let index = startIndex; index < Math.min(startIndex + count, galleryImages.length); index += 1) {
                fragment.appendChild(createGalleryImage(galleryImages[index], index));
            }
            root.appendChild(fragment);
        }

        let loadMoreIndex = 0;
        const loadMoreRoot = document.getElementById('load-more-gallery');
        const loadMoreButton = document.getElementById('load-more-button');

        function loadMoreImages() {
            const batchSize = 3;
            if (loadMoreIndex >= galleryImages.length) {
                loadMoreButton.disabled = true;
                loadMoreButton.textContent = 'All loaded';
                return;
            }
            renderBatch('load-more-gallery', loadMoreIndex, batchSize);
            loadMoreIndex += batchSize;
            if (loadMoreIndex >= galleryImages.length) {
                loadMoreButton.disabled = true;
                loadMoreButton.textContent = 'All loaded';
            }
        }

        loadMoreButton.addEventListener('click', loadMoreImages);
        loadMoreImages();

        let infiniteIndex = 0;
        const infiniteRoot = document.getElementById('infinite-gallery');
        const sentinel = document.getElementById('infinite-sentinel');

        function loadInfiniteImages() {
            const batchSize = 3;
            if (infiniteIndex >= galleryImages.length) {
                return;
            }
            renderBatch('infinite-gallery', infiniteIndex, batchSize);
            infiniteIndex += batchSize;
        }

        const observer = new IntersectionObserver(function (entries) {
            if (entries[0].isIntersecting) {
                loadInfiniteImages();
            }
        }, { rootMargin: '200px' });
        observer.observe(sentinel);
        loadInfiniteImages();

        const carouselImage = document.getElementById('carousel-image');
        const carouselCaption = document.getElementById('carousel-caption');
        const previousButton = document.getElementById('carousel-previous');
        const nextButton = document.getElementById('carousel-next');
        let carouselIndex = 0;

        function updateCarousel() {
            const item = galleryImages[carouselIndex];
            carouselImage.src = item.src;
            carouselImage.alt = item.alt;
            carouselCaption.textContent = item.alt;
        }

        function moveCarousel(step) {
            carouselIndex = (carouselIndex + step + galleryImages.length) % galleryImages.length;
            updateCarousel();
        }

        previousButton.addEventListener('click', function () {
            moveCarousel(-1);
        });
        nextButton.addEventListener('click', function () {
            moveCarousel(1);
        });

        updateCarousel();
    </script>
</section>
