<section class="experiment">
    <h2>Challenge 16</h2>
    <h3>Performance API Resource Discovery</h3>
    <p>Images are loaded normally, then discovered with the Performance API.</p>

    <div class="image-gallery" id="performance-gallery">
        <img src="{{ url_for('static', filename='images/look1.jpg') }}" alt="Performance image 1">
        <img src="{{ url_for('static', filename='images/look2.jpg') }}" alt="Performance image 2">
        <img src="{{ url_for('static', filename='images/look3.jpg') }}" alt="Performance image 3">
    </div>

    <button id="discover-resources" type="button">Discover Resource Entries</button>
    <pre id="performance-output"></pre>

    <script>
        document.getElementById('discover-resources').addEventListener('click', function () {
            const entries = performance.getEntriesByType('resource');
            const images = entries.filter(function (entry) {
                return entry.initiatorType === 'img' || entry.name.includes('/static/images/');
            }).map(function (entry) {
                return {
                    name: entry.name,
                    initiatorType: entry.initiatorType,
                    duration: Math.round(entry.duration)
                };
            });
            document.getElementById('performance-output').textContent = JSON.stringify(images, null, 2);
        });
    </script>
</section>
