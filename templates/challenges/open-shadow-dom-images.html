<section class="experiment">
    <h2>Challenge 17</h2>
    <h3>Open Shadow DOM Images</h3>
    <p>Images are injected into an open shadow root.</p>

    <div id="open-shadow-host"></div>

    <script>
        const host = document.getElementById('open-shadow-host');
        const shadow = host.attachShadow({ mode: 'open' });
        shadow.innerHTML = `
            <style>
                .shadow-gallery { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
                .shadow-gallery img { width: 100%; border-radius: 1rem; }
            </style>
            <div class="shadow-gallery">
                <img src="{{ url_for('static', filename='images/look1.jpg') }}" alt="Shadow image 1">
                <img src="{{ url_for('static', filename='images/look2.jpg') }}" alt="Shadow image 2">
                <img src="{{ url_for('static', filename='images/look3.jpg') }}" alt="Shadow image 3">
            </div>
        `;
    </script>
</section>
