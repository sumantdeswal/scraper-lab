<section class="experiment">
    <h2>Challenge 13</h2>
    <h3>Fetch Interception</h3>
    <p>Intercepted requests return alternate data before the real endpoint responds.</p>

    <button id="fetch-intercept" type="button">Fetch Intercepted Product</button>
    <pre id="fetch-interception-output"></pre>

    <script>
        const originalFetch = window.fetch;

        window.fetch = async function (resource, options) {
            if (typeof resource === 'string' && resource.endsWith('/api/product')) {
                return new Response(JSON.stringify({
                    product: {
                        title: 'Intercepted Jacket',
                        description: 'This response was intercepted by client-side fetch middleware.',
                        images: [
                            '{{ url_for('static', filename='images/look1.jpg') }}'
                        ]
                    }
                }), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            return originalFetch(resource, options);
        };

        document.getElementById('fetch-intercept').addEventListener('click', async function () {
            const response = await fetch('/api/product');
            const data = await response.json();
            document.getElementById('fetch-interception-output').textContent = JSON.stringify(data, null, 2);
        });
    </script>
</section>
