<section class="experiment">
    <h2>Challenge 7</h2>
    <h3>Dynamic DOM Generation</h3>
    <p>Images do not exist in the initial DOM. Runtime DOM creation appears after a button click.</p>

    <div class="experiment-controls">
        <button id="load-click-images" type="button">Load After Click</button>
    </div>

    <div class="dynamic-demo-grid">
        <section>
            <span class="status-pill">Click-based</span>
            <div id="click-root"></div>
            <p id="runtime-status">Runtime DOM creation pending.</p>
        </section>
    </div>

    <script>
        const imageSources = [
            "{{ url_for('static', filename='images/look1.jpg') }}",
            "{{ url_for('static', filename='images/look2.jpg') }}",
            "{{ url_for('static', filename='images/look3.jpg') }}"
        ];

        const statusElement = document.getElementById('runtime-status');

        function createImage(src, alt) {
            const img = document.createElement('img');
            img.src = src;
            img.alt = alt;
            img.loading = 'eager';
            return img;
        }

        function appendImages(rootId, count, prefix) {
            const root = document.getElementById(rootId);
            root.innerHTML = '';
            for (let index = 0; index < count; index += 1) {
                const image = createImage(imageSources[index % imageSources.length], prefix + ' image ' + (index + 1));
                root.appendChild(image);
            }
        }

        const observer = new MutationObserver(function (mutations) {
            if (mutations.some((mutation) => mutation.addedNodes.length)) {
                statusElement.textContent = 'MutationObserver detected runtime DOM creation.';
            }
        });

        observer.observe(document.getElementById('click-root'), { childList: true, subtree: true });

        document.getElementById('load-click-images').addEventListener('click', function () {
            appendImages('click-root', 3, 'Clicked');
        });
    </script>
</section>
