<section class="experiment">
    <h2>Challenge 15</h2>
    <h3>Images Loaded via XMLHttpRequest</h3>
    <p>Image URLs are loaded with XMLHttpRequest and rendered into the page.</p>

    <button id="load-xhr-images" type="button">Load XHR Images</button>
    <div class="image-gallery" id="xhr-images-gallery"></div>

    <script>
        function loadXhrImages() {
            const request = new XMLHttpRequest();
            request.open('GET', '/static/data/images.json');
            request.onload = function () {
                if (request.status >= 200 && request.status < 300) {
                    const data = JSON.parse(request.responseText);
                    const gallery = document.getElementById('xhr-images-gallery');
                    gallery.innerHTML = data.images.map(function (src) {
                        return '<img src="' + src + '" alt="XHR image">';
                    }).join('');
                }
            };
            request.send();
        }

        document.getElementById('load-xhr-images').addEventListener('click', loadXhrImages);
    </script>
</section>
