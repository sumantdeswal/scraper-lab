<!DOCTYPE html>
<html>
<head>
    <title>Scraper Lab</title>
</head>
<body>

<h1>Scraper Lab</h1>

{% for slug, challenge in challenges.items() %}

<div>
    <h3>{{ challenge.number }}. {{ challenge.title }}</h3>
    <p>{{ challenge.description }}</p>

    <a href="{{ url_for('challenge', challenge_id=slug) }}">
        Open Challenge
    </a>
</div>

{% endfor %}

</body>
</html>
